<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Status card with animated badge</title>
</head>

<body>
  <main>
    <div class="main-container">
      <span class="animated-badge-label">Motion Basics</span>
      <h1 class="animated-badge-title">Я учусь понимать keyframes</h1>
      <p class="animated-badge-paragraph">Сейчас я тренирую базовую animation и отличие animation от transition.</p>
      <span class="animated-badge">New</span>
      <button type="button" class="animated-badge-button">Continue</button>
    </div>
  </main>
</body>

</html>
