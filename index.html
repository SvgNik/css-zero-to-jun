<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>CSS Typography</title>
</head>

<body>
  <main>
    <section class="practice-section">
      <p class="practice-text">CSS Typography</p>
      <h1 class="practice-title">Я учусь делать текст читаемым и аккуратным</h1>
      <p class="practice-paragraph">Сейчас моя задача — понять размеры текста, высоту строки, насыщенность шрифта и
        базовые
        единицы измерения,
        чтобы
        интерфейс выглядел аккуратно и профессионально.</p>
      <ul class="practice-list">
        <li>px</li>
        <li>rem</li>
        <li>font-size</li>
        <li>line-height</li>
        <li>font-weight</li>
      </ul>
      <button class="practice-button" type="button">Продолжить обучение</button>
    </section>
  </main>
</body>

</html>
