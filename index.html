<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Interactive action panel</title>
</head>

<body>
  <main>
    <section class="main-section">
      <div class="group-title">
        <h1 class="main-title">Interactive States</h1>
        <p>Я учусь делать интерфейс не только красивым, но и понятным в разных состояниях.</p>
      </div>

      <div class="group-links">
        <a class="main-link" href="#">Documentation</a>
        <a class="main-link" href="#">Roadmap</a>
      </div>

      <div class="group-button">
        <button class="main-button" type="button">Start</button>
        <button class="main-button" type="button">Save</button>
        <button class="main-button" type="button" disabled>Disabled action</button>
      </div>

      <div class="group-list">
        <ul class="main-list">
          <li class="list-item">HTML</li>
          <li class="list-item">CSS</li>
          <li class="list-item">JavaScript</li>
          <li class="list-item">React</li>
        </ul>
      </div>
    </section>
  </main>

</body>

</html>
