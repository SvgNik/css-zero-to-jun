<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Reusable UI card</title>
</head>

<body>
  <main>
    <div class="main-section">
      <span class="reusable-label">Design Tokens</span>
      <h1 class="reusable-title">Я учусь убирать дублирование в CSS</h1>
      <p class="reusable-paragraph">Сейчас я тренирую CSS Variables, чтобы цвета, отступы и радиусы были единообразными.
      </p>
      <a href="#" class="reusable-link">Read docs</a>
      <button type="button" class="reusable-button">Apply styles</button>
    </div>
  </main>
</body>

</html>
