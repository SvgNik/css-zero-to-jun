<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Simple dashboard header + cards row</title>
</head>

<body>
  <header class="header-container">
    <span class="logo">DevTrack</span>
    <nav class="navigation">
      <ul class="nav-list">
        <li><a href="#">Dashboard</a></li>
        <li><a href="#">Projects</a></li>
        <li><a href="#">Settings</a></li>
      </ul>
    </nav>
    <button type="button" class="profile-button">Profile</button>
  </header>

  <main>
    <section class="card-container">
      <div class="card">
        <span class="card-label">HTML</span>
        <h2 class="card-title">Structure</h2>
        <p class="card-description">Я учусь строить понятную и чистую разметку.</p>
      </div>

      <div class="card">
        <span class="card-label">CSS</span>
        <h2 class="card-title">Layout</h2>
        <p class="card-description">Я тренируюсь управлять расположением элементов.</p>
      </div>

      <div class="card">
        <span class="card-label">Practice</span>
        <h2 class="card-title">Consistency</h2>
        <p class="card-description">Я довожу каждый блок до понятного результата.</p>
      </div>
    </section>
  </main>
</body>

</html>
